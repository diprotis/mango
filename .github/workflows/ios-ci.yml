name: iOS CI

on:
  push:
    branches: [main]
    paths: ["ios/**", ".github/workflows/ios-ci.yml"]
  pull_request:
    paths: ["ios/**", ".github/workflows/ios-ci.yml"]

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Show available Xcode / simulators
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -i iphone || true

      - name: SwiftLint (non-blocking)
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --quiet || true
          else
            echo "SwiftLint not installed on runner; skipping."
          fi

      - name: Theme token audit
        run: bash scripts/check_theme.sh

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Mango.xcodeproj \
            -scheme Mango \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult
          if-no-files-found: ignore
