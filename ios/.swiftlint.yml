disabled_rules:
  - trailing_whitespace
  - todo
  - line_length
  - type_body_length
  - file_length
  - cyclomatic_complexity
  - function_body_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil

excluded:
  - ${PWD}/Mango.xcodeproj
  - DerivedData
  - build

identifier_name:
  min_length: 1
  max_length: 60

nesting:
  type_level: 3
